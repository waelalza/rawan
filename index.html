<script>
(function () {
  // ========= الإعداد =========
  const API_URL = "https://cf-ai.waeel-zahrani.workers.dev"; // غيّر عند الحاجة

  // ========= أدوات عامة =========
  const $ = s => document.querySelector(s);
  const outToast = $('#toast');
  const clean = (txt) => {
    if (!txt) return "";
    // إزالة شخابيط، أسطر مكسورة، إنجليزي، علامات غريبة
    txt = txt.replace(/\\[nr]/g, " ")
             .replace(/[A-Za-z[\]{}_*<>`~]/g, "")
             .replace(/\s{2,}/g, " ")
             .replace(/[“”"']/g, "")
             .trim();
    // ممنوع ردود “خدمة/مساعدة”
    const banned = ["مساعدتك", "سؤال", "هذا الموقع", "يسعدني", "مصادر إضافية", "خدمتك", "مشكلتك"];
    if (banned.some(b => txt.includes(b))) return "";
    return txt;
  };
  const onlyShort = (txt, maxChars=60) => (txt || "").slice(0, maxChars).trim();
  const splitLines = (s) => (s || "").split(/\n|[؛.!؟]\s*/).map(t => clean(t)).filter(Boolean);

  const toast = (t) => {
    if (!outToast) return;
    outToast.textContent = t || "";
    outToast.classList.add("show");
    setTimeout(() => outToast.classList.remove("show"), 1400);
  };

  // ========= استدعاء الذكاء الاصطناعي =========
  async function ai(prompt){
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    const text = await res.text();
    let data = {};
    try { data = JSON.parse(text); } catch { return ""; }
    const raw = data.response || (data.result && data.result.response) || "";
    return clean(raw);
  }

  // ========= بطل الصفحة والموسيقى =========
  const audio = $('#audio'), musicBtn = $('#musicBtn'), vinyl = $('#vinylBtn'), musicHint = $('#musicHint');
  const setMusicUI = (p) => {
    if (musicBtn) { musicBtn.textContent = p ? "إيقاف" : "الموسيقى"; musicBtn.setAttribute("aria-pressed", p ? "true" : "false"); }
    vinyl?.classList.toggle("playing", p);
  };
  const tryAutoplay = async () => {
    try { audio.muted = false; audio.volume = 1; await audio.play(); setMusicUI(true); musicHint.textContent = ""; }
    catch { musicHint.textContent = "اضغطي للتشغيل"; }
  };
  window.addEventListener("load", tryAutoplay);
  musicBtn?.addEventListener("click", async () => { if (audio.paused) { try { await audio.play(); setMusicUI(true);} catch {} } else { audio.pause(); setMusicUI(false);} });
  vinyl?.addEventListener("click", async () => { if (audio.paused) { try { await audio.play(); setMusicUI(true);} catch {} } else { audio.pause(); setMusicUI(false);} });

  $('#startBtn').onclick = () => $('#poems').scrollIntoView({ behavior: "smooth" });
  $('#toGuest').onclick = () => $('#guest').scrollIntoView({ behavior: "smooth" });
  $('#copyLink').onclick = async () => { try { await navigator.clipboard.writeText(location.href); toast("تم النسخ"); } catch { toast("تعذّر النسخ"); } };

  // ========= بتلات =========
  const petalsLayer = $('#petals');
  function dropPetal(){
    const p = document.createElement('div'), size = 10 + Math.random()*16;
    const colors = ['#FF6B8B','#8B88FF','#FFD166','#FF99CC'];
    const shapes = ['100% 0 100% 100%','50% 0 50% 100%','100% 100% 0 100%','50% 50% 50% 50%'];
    p.style.cssText = `position:absolute;width:${size}px;height:${size*0.8}px;right:${Math.random()*100}%;top:${-30-Math.random()*50}px;background:linear-gradient(135deg,${colors[(Math.random()*4)|0]},rgba(255,255,255,.7));border-radius:${shapes[(Math.random()*4)|0]};box-shadow:0 10px 20px rgba(255,107,139,.35);opacity:.95`;
    petalsLayer.appendChild(p);
    const fall=6500+Math.random()*4500, drift=40+Math.random()*50;
    p.animate([{transform:'translate3d(0,0,0)',opacity:.8},{transform:`translate3d(${drift}px,20vh,0)`,opacity:.95},{transform:`translate3d(${drift*1.8}px,105vh,0)`,opacity:0}],{duration:fall,easing:'cubic-bezier(.3,.8,.2,1)'});
    setTimeout(()=>p.remove(), fall+80);
  }
  setInterval(()=>{ if (document.hasFocus()) dropPetal(); }, 340);

  // ========= خريطة السماء =========
  const sky = $('#skyCanvas'); const sk = sky.getContext('2d');
  const stars=[{x:150,y:100,s:3},{x:500,y:80,s:3},{x:300,y:250,s:2},{x:100,y:300,s:2},{x:250,y:330,s:2},{x:400,y:200,s:2}];
  (function draw(){
    sk.clearRect(0,0,sky.width,sky.height);
    stars.forEach(st=>{ sk.beginPath(); sk.arc(st.x,st.y,st.s,0,2*Math.PI); sk.fillStyle='#fff'; sk.fill(); });
    sk.beginPath(); sk.moveTo(150,100); sk.lineTo(500,80); sk.lineTo(300,250); sk.closePath();
    sk.strokeStyle='rgba(255,255,255,.28)'; sk.lineWidth=1; sk.stroke();
    requestAnimationFrame(draw);
  })();

  // ========= توليد نصوص البطل/السماء =========
  async function fillHero(){
    let tag = await ai("اكتب سطر تعريف عربي رومانسي للصفحة، بلا علامات تنصيص، أقل من ٦ كلمات، لغة فصيحة مبسطة، دون تعبيرات خدمية.");
    $('#heroTag').textContent = onlyShort(tag, 40);
  }
  async function fillSky(){
    let badge = await ai("اكتب شارة عربية قصيرة جدًا من كلمتين فقط تصف ذكرى حب. بدون نقاط أو علامات.");
    let note  = await ai("اكتب سطرًا عربيًا قصيرًا يدعو للضغط على النجوم لاسترجاع ذكرى رومانسية. جملة واحدة فقط.");
    $('#skyBadge').textContent = onlyShort(badge, 18);
    $('#skyNote').textContent  = onlyShort(note, 70);
  }
  async function fillStars(){
    const ids = ['#star1','#star2','#star3','#star4','#star5'];
    const base = ["ويغا","دنيب","الطائر","عرق الجاثا","سبيكا"];
    for (let i=0;i<ids.length;i++){
      const el = $(ids[i]);
      let memo = await ai(`اكتب تذكرة رومانسية قصيرة من ٣–٦ كلمات مرتبطة بنجمة اسمها "${base[i]}". جملة عربية فقط.`);
      memo = onlyShort(memo, 40);
      el.textContent = base[i];
      el.dataset.msg = memo;
      el.onclick = () => toast(el.dataset.msg || "");
    }
  }

  // ========= مشاهد قصيرة (منظمة) =========
  async function fillScene(badgeSel, linesSel, bp, lp, maxLines=4){
    const b = onlyShort(await ai(bp), 16);
    $(badgeSel).textContent = b;
    const txt = await ai(lp);
    const lines = splitLines(txt).slice(0, maxLines);
    const box = $(linesSel); box.innerHTML = "";
    lines.forEach((ln,i)=>{ const d=document.createElement('div'); d.className='line'; d.textContent=ln; box.appendChild(d); setTimeout(()=>d.classList.add('show'), 140*i); });
  }

  // ========= القصائد =========
  const poemBox = $('#poemBox'), herName = $('#herName'), poemMode = $('#poemMode');
  async function composePoem(){
    poemBox.innerHTML = '<div class="poem-line show">…</div>';
    const name = (herName.value || "روان").trim();
    const style = poemMode.value === 'qabbani' ? 'أسلوب نزار قباني: لغة رقيقة مختصرة' :
                  poemMode.value === 'free'    ? 'غزل عربي حديث، مباشر' :
                  poemMode.value === 'pledge'  ? 'عهد محبّ قصير' :
                  'غزل علمي مبسّط بلا مصطلحات ثقيلة';
    const prompt = `اكتب قصيدة عربية قصيرة عن ${name}، ${style}. خمسة أسطر فقط. افصل الأسطر بسطر جديد. لا تستخدم علامات اقتباس. لا كلام خِدمي. نهاية بوعد لطيف.`;
    const txt = await ai(prompt);
    poemBox.innerHTML = "";
    splitLines(txt).slice(0,5).forEach((ln,i)=> {
      const d = document.createElement('div');
      d.className = 'poem-line';
      d.textContent = ln;
      poemBox.appendChild(d);
      setTimeout(()=>d.classList.add('show'), 140*i);
    });
  }
  $('#newPoem')?.addEventListener('click', composePoem);

  // ========= التنبؤ: لما بعد الزواج =========
  $('#fortuneBtn')?.addEventListener('click', async ()=>{
    const card=document.createElement('div');
    card.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--pink);color:white;padding:20px;border-radius:20px;z-index:100;text-align:center;max-width:320px;box-shadow:0 20px 50px rgba(0,0,0,.25)';
    card.innerHTML='<p id="fortuneText">…</p><button onclick="this.parentNode.remove()" style="background:transparent;border:1px solid white;color:white;padding:8px;border-radius:20px;cursor:pointer;margin-top:6px">إغلاق</button>';
    document.body.appendChild(card);
    let txt = await ai('اكتب سطرًا عربيًا واحدًا يبدأ بعبارة "بعد الزواج" ويتحدث بتفاؤل عن عامنا الأول معًا بلا مبالغة. أقل من ١٦ كلمة.');
    $('#fortuneText').textContent = onlyShort(txt, 90);
  });

  // ========= العدّاد (مساعد) =========
  const dd=$('#dd'),hh=$('#hh'),mm=$('#mm'),ss=$('#ss'),dateInput=$('#dateInput');
  let target=new Date((dateInput?.value||'2026-03-20')+'T00:00:00');
  function tick(){ const t=target-new Date(); if(t<=0){ dd.textContent=hh.textContent=mm.textContent=ss.textContent='0'; return; }
    dd.textContent=Math.floor(t/86400000);
    hh.textContent=Math.floor((t%86400000)/3600000);
    mm.textContent=Math.floor((t%3600000)/60000);
    ss.textContent=Math.floor((t%60000)/1000);
  }
  setInterval(tick,1000); tick();
  dateInput?.addEventListener('change',()=>{ target=new Date(dateInput.value+'T00:00:00'); tick(); });

  // ========= لعبة القلوب + رسائل AI قصيرة =========
  const cvs=$('#gameCanvas'), ctx=cvs?.getContext('2d');
  const gStart=$('#gStart'),gReset=$('#gReset'),gScore=$('#gScore'),gTime=$('#gTime'),gCombo=$('#gCombo'),gMsg=$('#gMsg');
  let hearts=[],running=false,tLeft=30,score=0,combo=1,lastTap=0,spawnAcc=0,raf=0;

  function fitGame(){
    if (!cvs) return;
    const dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
    const w=cvs.clientWidth,h=Math.round(w*0.53);
    cvs.style.height=h+'px'; cvs.width=Math.round(w*dpr); cvs.height=Math.round(h*dpr);
    ctx?.setTransform(dpr,0,0,dpr,0,0);
  }
  function drawHeart(x,y,s,color){ ctx.save(); ctx.translate(x,y); ctx.scale(s/20,s/20); ctx.fillStyle=color;
    ctx.beginPath(); ctx.moveTo(0,-6); ctx.bezierCurveTo(8,-18,28,-10,28,6); ctx.bezierCurveTo(28,22,14,30,0,38);
    ctx.bezierCurveTo(-14,30,-28,22,-28,6); ctx.bezierCurveTo(-28,-10,-8,-18,0,-6); ctx.fill(); ctx.restore(); }
  function spawnHeart(special=false){ if(!cvs) return; const w=cvs.clientWidth,h=cvs.clientHeight; const x=20+Math.random()*(w-40),y=h+30,vy=-(1.8+Math.random()*2.2),vx=(Math.random()-0.5)*1.0; hearts.push({x,y,vx,vy,s:16+Math.random()*14,special}); }
  function loop(){ if(!ctx||!cvs){ cancelAnimationFrame(raf); return; } raf=requestAnimationFrame(loop);
    ctx.clearRect(0,0,cvs.clientWidth,cvs.clientHeight);
    spawnAcc+=16; const rate=Math.max(350,800-score*15); if(spawnAcc>rate){ spawnAcc=0; spawnHeart(Math.random()<0.18); }
    for(let i=hearts.length-1;i>=0;i--){ const h=hearts[i]; h.x+=h.vx; h.y+=h.vy; h.vy-=0.003; drawHeart(h.x,h.y,h.s, h.special?'#FFD166':'#FF6B8B'); if(h.y<-40) hearts.splice(i,1); }
    if(running){ loop.t=(loop.t||performance.now()); const now=performance.now(); if(now-loop.t>=1000){ loop.t=now; tLeft--; gTime.textContent=tLeft; if(tLeft<=0) endGame(); } }
  }
  function resetGame(){ hearts=[];tLeft=30;score=0;combo=1; gScore.textContent=0; gCombo.textContent='x1'; gTime.textContent=tLeft; gMsg.style.display='none'; }
  function startGame(){ if(running) return; resetGame(); running=true; cancelAnimationFrame(raf); loop.t=performance.now(); raf=requestAnimationFrame(loop); }
  function endGame(){ running=false; cancelAnimationFrame(raf); gMsg.style.display='inline-block'; gMsg.textContent = score>=25 ? (gMsg.dataset.win||"") : (gMsg.dataset.again||""); }
  function pop(x,y){ const r=cvs.getBoundingClientRect(),px=x-r.left,py=y-r.top; let ok=false;
    for(let i=hearts.length-1;i>=0;i--){ const h=hearts[i],dx=px-h.x,dy=py-h.y,R=h.s*0.9; if(dx*dx+dy*dy<=R*R*1.1){ hearts.splice(i,1); ok=true; const now=performance.now(); combo=(now-lastTap<900)?Math.min(combo+1,7):1; lastTap=now; score+=combo; gScore.textContent=score; gCombo.textContent='x'+combo; break; } }
    if(!ok){ combo=1; gCombo.textContent='x1'; }
  }
  cvs?.addEventListener('pointerdown',e=>pop(e.clientX,e.clientY),{passive:true});
  gStart?.addEventListener('click',()=>{ fitGame(); startGame(); });
  gReset?.addEventListener('click', resetGame);
  window.addEventListener('resize', fitGame); fitGame();

  async function setGameMessages(){
    const win = await ai('اكتب عبارة فوز عربية قصيرة جدًا ومؤدبة. ٣–٤ كلمات.');
    const again = await ai('اكتب عبارة تشجيع عربية قصيرة جدًا للمحاولة مجددًا. ٣–٤ كلمات.');
    if (gMsg){ if (win) gMsg.dataset.win = onlyShort(win, 20); if (again) gMsg.dataset.again = onlyShort(again, 20); }
  }

  // ========= التشغيل =========
  (async function boot(){
    await fillHero();
    await fillSky();
    await fillStars();
    await fillScene('#b1','#l1','اكتب شارة عربية من كلمتين فقط تصف بداية الحب.','اكتب ٣ أسطر عربية قصيرة ومرتبة عن لحظة اكتشاف الحب. افصل الأسطر بسطر جديد.',3);
    await fillScene('#b2','#l2','اكتب شارة عربية من كلمتين فقط تصف حلاوة الاسم.','اكتب ٣ أسطر عربية موجزة عن اسم روان بحلاوة رصينة بلا مبالغة. افصل الأسطر بسطر جديد.',3);
    await fillScene('#b3','#l3','اكتب شارة عربية من كلمتين فقط تصف علماً رقيقاً.','اكتب ٣ أسطر عربية تمزج العلم بالحنان بلغة مبسطة. افصل الأسطر بسطر جديد.',3);
    await fillScene('#b4','#l4','اكتب شارة عربية من كلمتين فقط تصف عهد قلب.','اكتب ٤ أسطر عربية قصيرة على شكل وعود واضحة. افصل الأسطر بسطر جديد.',4);
    await composePoem();
    await setGameMessages();
  })();
})();
</script>
