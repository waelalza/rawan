<script>
async function runHF(prompt){
  const res = await fetch("https://hf-proxy.yourname.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "gpt2",
      inputs: prompt,
      options: { wait_for_model: true }
    })
  });
  if(!res.ok){ throw new Error("HF proxy error " + res.status); }
  return await res.json();
}

// example usage
runHF("اكتب سطر حب قصير إلى روان.")
  .then(data => console.log(data))
  .catch(err => console.error(err));
</script>
